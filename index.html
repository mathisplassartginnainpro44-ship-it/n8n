<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Engine Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #07070a;
            --surface: #101018;
            --surface-hover: #161622;
            --accent: #7c6aff;
            --accent-glow: rgba(124, 106, 255, 0.4);
            --text: #e8e8f0;
            --muted: #808095;
            --correct: #2dff9e;
            --wrong: #ff4d6d;
            --grad: linear-gradient(135deg, #7c6aff 0%, #ff6a9e 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Background Decorations */
        .bg-glow {
            position: fixed;
            width: 50vw; height: 50vw;
            background: var(--accent-glow);
            filter: blur(120px);
            border-radius: 50%;
            z-index: -1;
            top: -20%; left: -10%;
            opacity: 0.3;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }

        /* Header */
        header { text-align: center; margin-bottom: 60px; }
        .logo { 
            font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 4px; color: var(--accent);
            margin-bottom: 10px; display: block;
        }
        h1 { 
            font-family: 'Syne', sans-serif; font-size: clamp(32px, 6vw, 56px); 
            font-weight: 800; line-height: 1; letter-spacing: -2px;
        }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .quiz-card {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .quiz-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            background: var(--surface-hover);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .quiz-card h3 { font-family: 'Syne', sans-serif; margin-bottom: 8px; font-size: 20px; }
        .quiz-card .meta { font-size: 12px; color: var(--muted); display: flex; gap: 15px; }
        .quiz-card .tag { 
            position: absolute; top: 15px; right: 15px; 
            font-size: 10px; padding: 2px 8px; border-radius: 4px;
            background: rgba(124, 106, 255, 0.1); color: var(--accent);
        }

        /* Action Bar */
        .action-bar {
            display: flex; gap: 15px; justify-content: center; margin-bottom: 40px;
        }

        .btn {
            padding: 12px 24px; border-radius: 8px; border: none;
            font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer;
            transition: 0.2s; display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid rgba(255,255,255,0.1); }
        .btn:hover { transform: scale(1.02); opacity: 0.9; }

        /* Quiz Player & Overlay */
        #quiz-player {
            position: fixed; inset: 0; background: var(--bg); z-index: 100;
            padding: 40px 20px; display: none; overflow-y: auto;
        }
        .close-player { position: absolute; top: 20px; right: 20px; font-size: 30px; cursor: pointer; color: var(--muted); }

        /* Reuse previous components with slight styling updates */
        .q-card { background: var(--surface); padding: 30px; border-radius: 20px; max-width: 700px; margin: 0 auto; }
        .choice-btn {
            width: 100%; padding: 16px; margin-top: 10px; border-radius: 12px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            color: var(--text); text-align: left; cursor: pointer; font-family: inherit;
        }
        .choice-btn:hover { background: rgba(124, 106, 255, 0.1); border-color: var(--accent); }
        .choice-btn.correct { border-color: var(--correct); color: var(--correct); background: rgba(45, 255, 158, 0.05); }
        .choice-btn.wrong { border-color: var(--wrong); color: var(--wrong); background: rgba(255, 77, 109, 0.05); }
        
        .progress-container { width: 100%; height: 4px; background: rgba(255,255,255,0.05); margin-bottom: 30px; border-radius: 2px; }
        .progress-bar { height: 100%; background: var(--grad); width: 0%; transition: 0.3s; }

        .hidden { display: none !important; }
        #import-zone { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            display: flex; align-items: center; justify-content: center; z-index: 200;
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="container" id="main-hub">
    <header>
        <span class="logo">Edu-Link // Engine</span>
        <h1>Mes Modules</h1>
    </header>

    <div class="action-bar">
        <button class="btn btn-primary" onclick="showImport()">+ Importer un Quiz</button>
        <button class="btn btn-secondary" onclick="resetLibrary()">Réinitialiser</button>
    </div>

    <div class="dashboard-grid" id="quiz-list">
        </div>
</div>

<div id="quiz-player">
    <span class="close-player" onclick="closePlayer()">×</span>
    <div style="max-width: 700px; margin: 0 auto;">
        <div class="progress-container"><div class="progress-bar" id="p-bar"></div></div>
        <div id="player-content"></div>
    </div>
</div>

<div id="import-zone" class="hidden">
    <div class="q-card" style="width: 90%; max-width: 500px;">
        <h2 style="margin-bottom: 20px; font-family: Syne;">Coller le JSON</h2>
        <textarea id="json-input" style="width:100%; height: 200px; background: #000; color: var(--correct); border: 1px solid var(--muted); padding: 10px; border-radius: 8px; font-size: 12px;" placeholder='{ "titre": "...", "questions": [...] }'></textarea>
        <div class="action-bar" style="margin-top: 20px; margin-bottom: 0;">
            <button class="btn btn-primary" onclick="processImport()">Valider</button>
            <button class="btn btn-secondary" onclick="hideImport()">Annuler</button>
        </div>
    </div>
</div>

<script>
// --- BIBLIOTHÈQUE DE DÉMO ---
const DEMO_QUIZZES = [
    {
        id: 'demo-1',
        titre: "Ondes et Signaux",
        questions: [
            { question: "Quelle est l'unité de la fréquence ?", choix: ["Hertz", "Watt", "Joule"], reponse: "Hertz", explication: "Le Hertz (Hz) mesure le nombre d'oscillations par seconde." }
        ]
    },
    {
        id: 'demo-2',
        titre: "Électricité : Loi d'Ohm",
        questions: [
            { question: "Quelle est la formule de la loi d'Ohm ?", choix: ["U = R x I", "P = U x I", "U = R / I"], reponse: "U = R x I", explication: "La tension est égale au produit de la résistance par l'intensité." }
        ]
    }
];

let library = [];
let currentQuiz = null;
let currentIdx = 0;
let score = 0;

// --- INITIALISATION ---
function init() {
    const saved = localStorage.getItem('quiz_library');
    if (saved) {
        library = JSON.parse(saved);
    } else {
        library = [...DEMO_QUIZZES];
    }
    renderLibrary();
}

function renderLibrary() {
    const list = document.getElementById('quiz-list');
    list.innerHTML = '';
    
    library.forEach((quiz, index) => {
        const card = document.createElement('div');
        card.className = 'quiz-card';
        card.onclick = () => startQuiz(index);
        card.innerHTML = `
            <span class="tag">${quiz.questions.length} Questions</span>
            <h3>${quiz.titre}</h3>
            <div class="meta">
                <span>Physique-Chimie</span>
                <span>Terminale</span>
            </div>
        `;
        list.appendChild(card);
    });
}

// --- LOGIQUE DU QUIZ ---
function startQuiz(index) {
    currentQuiz = library[index];
    currentIdx = 0;
    score = 0;
    document.getElementById('quiz-player').style.display = 'block';
    renderQuestion();
}

function renderQuestion() {
    const q = currentQuiz.questions[currentIdx];
    const container = document.getElementById('player-content');
    const progress = ((currentIdx) / currentQuiz.questions.length) * 100;
    document.getElementById('p-bar').style.width = `${progress}%`;

    container.innerHTML = `
        <div class="q-card">
            <p style="color: var(--accent); font-size: 12px; margin-bottom: 10px;">QUESTION ${currentIdx + 1}/${currentQuiz.questions.length}</p>
            <h2 style="font-family: Syne; margin-bottom: 25px;">${q.question}</h2>
            <div id="options">
                ${q.choix.map(c => `<button class="choice-btn" onclick="checkAnswer(this, '${c.replace(/'/g, "\\'")}')">${c}</button>`).join('')}
            </div>
            <div id="explanation-box" class="hidden" style="margin-top: 20px; padding: 15px; background: rgba(124,106,255,0.1); border-radius: 8px; color: var(--accent);">
                ${q.explication}
                <button class="btn btn-primary" style="margin-top: 15px; width: 100%;" onclick="nextStep()">Continuer</button>
            </div>
        </div>
    `;
}

function checkAnswer(btn, choice) {
    const correct = currentQuiz.questions[currentIdx].reponse;
    const allBtns = document.querySelectorAll('.choice-btn');
    allBtns.forEach(b => b.disabled = true);

    if (choice === correct) {
        btn.classList.add('correct');
        score++;
    } else {
        btn.classList.add('wrong');
        allBtns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
    }
    document.getElementById('explanation-box').classList.remove('hidden');
}

function nextStep() {
    currentIdx++;
    if (currentIdx < currentQuiz.questions.length) {
        renderQuestion();
    } else {
        showResults();
    }
}

function showResults() {
    const container = document.getElementById('player-content');
    const percent = Math.round((score / currentQuiz.questions.length) * 100);
    container.innerHTML = `
        <div class="q-card" style="text-align: center;">
            <h1 style="font-size: 64px; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">${percent}%</h1>
            <p style="margin-bottom: 30px;">Bravo ! Tu as validé ${score} questions sur ${currentQuiz.questions.length}.</p>
            <button class="btn btn-primary" onclick="closePlayer()">Retour au Hub</button>
        </div>
    `;
}

// --- GESTION IMPORT ---
function showImport() { document.getElementById('import-zone').classList.remove('hidden'); }
function hideImport() { document.getElementById('import-zone').classList.add('hidden'); }

function processImport() {
    try {
        const raw = document.getElementById('json-input').value;
        const data = JSON.parse(raw);
        data.id = 'quiz-' + Date.now();
        library.push(data);
        localStorage.setItem('quiz_library', JSON.stringify(library));
        renderLibrary();
        hideImport();
        document.getElementById('json-input').value = '';
    } catch (e) {
        alert("Erreur dans le format JSON. Vérifie la structure.");
    }
}

function resetLibrary() {
    if(confirm("Réinitialiser la bibliothèque ?")) {
        localStorage.removeItem('quiz_library');
        location.reload();
    }
}

function closePlayer() { document.getElementById('quiz-player').style.display = 'none'; }

init();
</script>
</body>
</html>
