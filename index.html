<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Engine IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --surface: #0f0f15;
            --surface-hover: #161622;
            --accent: #7c6aff;
            --accent-glow: rgba(124, 106, 255, 0.3);
            --text: #e8e8f0;
            --muted: #606075;
            --correct: #2dff9e;
            --wrong: #ff4d6d;
            --grad: linear-gradient(135deg, #7c6aff 0%, #ff6a9e 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        /* --- WELCOME SCREEN --- */
        #welcome-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center; padding: 20px;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .welcome-content { animation: scaleIn 1s ease-out forwards; }
        
        .welcome-title {
            font-family: 'Syne', sans-serif; font-size: clamp(40px, 10vw, 120px);
            font-weight: 800; line-height: 0.9; letter-spacing: -3px;
            background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .welcome-sub { color: var(--muted); font-size: 14px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px; }

        /* --- DASHBOARD --- */
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; display: none; animation: fadeIn 0.8s ease-out; }

        header { text-align: left; margin-bottom: 60px; display: flex; justify-content: space-between; align-items: flex-end; }
        h1 { font-family: 'Syne', sans-serif; font-size: 40px; font-weight: 800; letter-spacing: -1px; }

        /* --- QUIZ GRID --- */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .quiz-card {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px; padding: 30px; cursor: pointer;
            transition: 0.3s; position: relative;
        }

        .quiz-card:hover { border-color: var(--accent); transform: translateY(-5px); background: var(--surface-hover); }

        .empty-state {
            grid-column: 1 / -1; text-align: center; padding: 100px 20px;
            border: 2px dashed rgba(255,255,255,0.05); border-radius: 20px;
            color: var(--muted);
        }

        /* --- BUTTONS --- */
        .btn {
            padding: 16px 32px; border-radius: 12px; border: none;
            font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer;
            transition: 0.3s; font-size: 14px; text-transform: uppercase;
        }
        .btn-primary { background: var(--accent); color: white; box-shadow: 0 10px 20px var(--accent-glow); }
        .btn-secondary { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid rgba(255,255,255,0.1); }
        .btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* --- QUIZ PLAYER --- */
        #quiz-player {
            position: fixed; inset: 0; background: var(--bg); z-index: 100;
            padding: 40px 20px; display: none; overflow-y: auto;
        }
        .close-player { position: absolute; top: 30px; right: 30px; font-size: 40px; cursor: pointer; color: var(--muted); line-height: 0.5; }
        .q-card { background: var(--surface); padding: 40px; border-radius: 24px; max-width: 700px; margin: 0 auto; border: 1px solid rgba(255,255,255,0.05); }
        
        .choice-btn {
            width: 100%; padding: 18px; margin-top: 12px; border-radius: 12px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            color: var(--text); text-align: left; cursor: pointer; font-family: inherit; font-size: 15px;
            transition: 0.2s;
        }
        .choice-btn:hover { background: rgba(124, 106, 255, 0.1); border-color: var(--accent); }
        .choice-btn.correct { border-color: var(--correct); color: var(--correct); background: rgba(45, 255, 158, 0.05); }
        .choice-btn.wrong { border-color: var(--wrong); color: var(--wrong); background: rgba(255, 77, 109, 0.05); }

        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.05); margin-bottom: 40px; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--grad); width: 0%; transition: 0.4s; }

        /* --- MODAL IMPORT --- */
        #import-zone { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 500; padding: 20px; }
        .hidden { display: none !important; }

    </style>
</head>
<body>

<div id="welcome-screen">
    <div class="welcome-content">
        <div class="welcome-sub">Intelligence Artificielle & Apprentissage</div>
        <h1 class="welcome-title">QUIZ<br>ENGINE</h1>
        <button class="btn btn-primary" onclick="enterApp()">Ouvrir le Hub</button>
    </div>
</div>

<div class="container" id="main-hub">
    <header>
        <div>
            <p style="color: var(--accent); font-size: 12px; letter-spacing: 2px;">TABLEAU DE BORD</p>
            <h1>Mes Modules</h1>
        </div>
        <button class="btn btn-primary" onclick="toggleImport(true)">+ Nouveau</button>
    </header>

    <div class="dashboard-grid" id="quiz-list">
        </div>
</div>

<div id="quiz-player">
    <span class="close-player" onclick="closePlayer()">×</span>
    <div style="max-width: 700px; margin: 40px auto;">
        <div class="progress-bar"><div class="progress-fill" id="p-fill"></div></div>
        <div id="player-content"></div>
    </div>
</div>

<div id="import-zone">
    <div class="q-card" style="width: 100%; max-width: 600px;">
        <h2 style="font-family: Syne; margin-bottom: 10px;">Importer un Quiz</h2>
        <p style="color: var(--muted); font-size: 13px; margin-bottom: 20px;">Colle le code JSON généré par l'IA ci-dessous.</p>
        <textarea id="json-input" style="width:100%; height: 250px; background: #000; color: var(--correct); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; font-family: 'DM Mono'; font-size: 12px; outline: none;" placeholder='{ "titre": "...", "questions": [...] }'></textarea>
        <div style="display: flex; gap: 10px; margin-top: 25px;">
            <button class="btn btn-primary" style="flex: 2;" onclick="saveImport()">Ajouter à la bibliothèque</button>
            <button class="btn btn-secondary" style="flex: 1;" onclick="toggleImport(false)">Annuler</button>
        </div>
    </div>
</div>

<script>
    let library = [];
    let currentQuiz = null;
    let currentIdx = 0;
    let score = 0;

    // --- NAVIGATION ---
    function enterApp() {
        const screen = document.getElementById('welcome-screen');
        screen.style.opacity = '0';
        setTimeout(() => {
            screen.style.display = 'none';
            document.getElementById('main-hub').style.display = 'block';
            init();
        }, 800);
    }

    // --- LOGIQUE BIBLIOTHÈQUE ---
    function init() {
        const saved = localStorage.getItem('quiz_engine_lib');
        library = saved ? JSON.parse(saved) : [];
        renderLibrary();
    }

    function renderLibrary() {
        const list = document.getElementById('quiz-list');
        if (library.length === 0) {
            list.innerHTML = `
                <div class="empty-state">
                    <p style="font-size: 18px; color: var(--text); margin-bottom: 10px;">Aucun module trouvé</p>
                    <p>Importe ton premier JSON pour commencer à réviser.</p>
                </div>
            `;
            return;
        }

        list.innerHTML = library.map((quiz, i) => `
            <div class="quiz-card" onclick="startQuiz(${i})">
                <p style="color: var(--accent); font-size: 10px; font-weight: bold; margin-bottom: 5px;">${quiz.questions.length} QUESTIONS</p>
                <h3 style="font-family: Syne; font-size: 22px;">${quiz.titre}</h3>
                <button class="btn-secondary" style="margin-top:20px; padding: 5px 10px; font-size: 10px; border-radius: 5px;" onclick="event.stopPropagation(); deleteQuiz(${i})">Supprimer</button>
            </div>
        `).join('');
    }

    // --- LOGIQUE QUIZ ---
    function startQuiz(index) {
        currentQuiz = library[index];
        currentIdx = 0; score = 0;
        document.getElementById('quiz-player').style.display = 'block';
        renderQuestion();
    }

    function renderQuestion() {
        const q = currentQuiz.questions[currentIdx];
        const container = document.getElementById('player-content');
        const fill = (currentIdx / currentQuiz.questions.length) * 100;
        document.getElementById('p-fill').style.width = `${fill}%`;

        container.innerHTML = `
            <div class="q-card">
                <p style="color: var(--accent); font-size: 11px; margin-bottom: 15px; font-weight: bold;">OBJECTIF : ${currentIdx + 1} / ${currentQuiz.questions.length}</p>
                <h2 style="font-family: Syne; margin-bottom: 30px; font-size: 26px; line-height: 1.2;">${q.question}</h2>
                <div id="options">
                    ${q.choix.map(c => `<button class="choice-btn" onclick="checkAnswer(this, '${c.replace(/'/g, "\\'")}')">${c}</button>`).join('')}
                </div>
                <div id="feedback" class="hidden" style="margin-top: 30px; padding: 20px; background: rgba(124,106,255,0.08); border-left: 4px solid var(--accent); border-radius: 0 12px 12px 0;">
                    <p style="font-size: 14px; line-height: 1.6;">${q.explication || "Pas d'explication fournie."}</p>
                    <button class="btn btn-primary" style="margin-top: 20px; width: 100%;" onclick="nextStep()">Question Suivante →</button>
                </div>
            </div>
        `;
    }

    function checkAnswer(btn, choice) {
        const correct = currentQuiz.questions[currentIdx].reponse;
        const btns = document.querySelectorAll('.choice-btn');
        btns.forEach(b => b.disabled = true);

        if (choice === correct) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            btns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
        }
        document.getElementById('feedback').classList.remove('hidden');
    }

    function nextStep() {
        currentIdx++;
        if (currentIdx < currentQuiz.questions.length) renderQuestion();
        else showFinalResults();
    }

    function showFinalResults() {
        const pct = Math.round((score / currentQuiz.questions.length) * 100);
        document.getElementById('player-content').innerHTML = `
            <div class="q-card" style="text-align: center;">
                <p style="color: var(--muted); margin-bottom: 10px;">SESSION TERMINÉE</p>
                <h1 style="font-size: 80px; font-family: Syne; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">${pct}%</h1>
                <p style="margin-bottom: 30px; font-size: 18px;">${score} réponses correctes sur ${currentQuiz.questions.length}</p>
                <button class="btn btn-primary" onclick="closePlayer()">Retour au Dashboard</button>
            </div>
        `;
    }

    // --- ACTIONS ---
    function toggleImport(show) { document.getElementById('import-zone').style.display = show ? 'flex' : 'none'; }

    function saveImport() {
        try {
            const data = JSON.parse(document.getElementById('json-input').value);
            if (!data.titre || !data.questions) throw new Error();
            library.push(data);
            localStorage.setItem('quiz_engine_lib', JSON.stringify(library));
            renderLibrary();
            toggleImport(false);
            document.getElementById('json-input').value = '';
        } catch { alert("Format JSON invalide. Assure-toi d'avoir un 'titre' et une liste de 'questions'."); }
    }

    function deleteQuiz(index) {
        if (confirm("Supprimer ce module ?")) {
            library.splice(index, 1);
            localStorage.setItem('quiz_engine_lib', JSON.stringify(library));
            renderLibrary();
        }
    }

    function closePlayer() { document.getElementById('quiz-player').style.display = 'none'; }
</script>
</body>
</html>
