<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Engine Pro // Ultimate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --surface: #0f0f15;
            --surface-hover: #161622;
            --accent: #7c6aff;
            --accent-glow: rgba(124, 106, 255, 0.3);
            --text: #e8e8f0;
            --muted: #606075;
            --correct: #2dff9e;
            --wrong: #ff4d6d;
            --grad: linear-gradient(135deg, #7c6aff 0%, #ff6a9e 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* --- WELCOME SCREEN --- */
        #welcome-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .welcome-title {
            font-family: 'Syne', sans-serif; font-size: clamp(40px, 10vw, 100px);
            font-weight: 800; line-height: 0.9; letter-spacing: -3px;
            background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        /* --- DASHBOARD --- */
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; display: none; animation: fadeIn 0.6s ease-out; }
        header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 60px; flex-wrap: wrap; gap: 20px; }
        h1 { font-family: 'Syne', sans-serif; font-size: 42px; font-weight: 800; }

        /* --- GRID & CARDS --- */
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .quiz-card {
            background: var(--surface); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px; padding: 30px; cursor: pointer; transition: 0.3s;
        }
        .quiz-card:hover { border-color: var(--accent); transform: translateY(-5px); background: var(--surface-hover); }
        .empty-state { grid-column: 1 / -1; text-align: center; padding: 80px 20px; border: 2px dashed rgba(255,255,255,0.1); border-radius: 24px; color: var(--muted); }

        /* --- BUTTONS --- */
        .btn {
            padding: 14px 28px; border-radius: 14px; border: none;
            font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer;
            transition: 0.3s; font-size: 13px; text-transform: uppercase;
        }
        .btn-primary { background: var(--accent); color: white; box-shadow: 0 10px 20px var(--accent-glow); }
        .btn-secondary { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid rgba(255,255,255,0.1); }
        .btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* --- IMPORT MODAL --- */
        #import-zone { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 500; padding: 20px; backdrop-filter: blur(10px); }
        .upload-area {
            border: 2px dashed rgba(124, 106, 255, 0.3); border-radius: 16px; padding: 30px;
            text-align: center; margin-bottom: 20px; cursor: pointer; transition: 0.3s;
        }
        .upload-area:hover { border-color: var(--accent); background: rgba(124, 106, 255, 0.05); }

        /* --- QUIZ PLAYER --- */
        #quiz-player { position: fixed; inset: 0; background: var(--bg); z-index: 100; padding: 40px 20px; display: none; overflow-y: auto; }
        .q-card { background: var(--surface); padding: 40px; border-radius: 28px; max-width: 720px; margin: 40px auto; border: 1px solid rgba(255,255,255,0.05); }
        
        .choice-btn {
            width: 100%; padding: 20px; margin-top: 12px; border-radius: 14px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            color: var(--text); text-align: left; cursor: pointer; font-family: inherit; font-size: 16px; transition: 0.2s;
        }
        .choice-btn.correct { border-color: var(--correct) !important; color: var(--correct); background: rgba(45, 255, 158, 0.1) !important; }
        .choice-btn.wrong { border-color: var(--wrong) !important; color: var(--wrong); background: rgba(255, 77, 109, 0.1) !important; }

        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.05); margin-bottom: 40px; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--grad); width: 0%; transition: 0.4s; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="welcome-screen">
    <div class="welcome-title">QUIZ ENGINE</div>
    <p style="color: var(--muted); margin-bottom: 40px; letter-spacing: 3px;">PRÊT POUR LA SESSION ?</p>
    <button class="btn btn-primary" onclick="enterApp()">Lancer le Hub</button>
</div>

<div class="container" id="main-hub">
    <header>
        <div>
            <p style="color: var(--accent); font-size: 11px; font-weight: bold; letter-spacing: 2px;">VOTRE BIBLIOTHÈQUE</p>
            <h1>Mes Modules</h1>
        </div>
        <button class="btn btn-primary" onclick="toggleImport(true)">+ Importer un fichier</button>
    </header>

    <div class="dashboard-grid" id="quiz-list"></div>
</div>

<div id="quiz-player">
    <div style="max-width: 720px; margin: 0 auto; position: relative;">
        <span style="position: absolute; top: -10px; right: 0; font-size: 40px; cursor: pointer; color: var(--muted);" onclick="closePlayer()">×</span>
        <div class="progress-bar"><div class="progress-fill" id="p-fill"></div></div>
        <div id="player-content"></div>
    </div>
</div>

<div id="import-zone">
    <div class="q-card" style="width: 100%; max-width: 600px; margin-top: 0;">
        <h2 style="font-family: Syne; margin-bottom: 20px;">Nouvel Import</h2>
        
        <div class="upload-area" onclick="document.getElementById('file-input').click()">
            <span style="font-size: 40px;">📂</span>
            <p id="file-label" style="margin-top: 10px;">Cliquez pour choisir un fichier <strong>.json</strong></p>
            <input type="file" id="file-input" hidden accept=".json" onchange="handleFile(event)">
        </div>

        <p style="text-align: center; color: var(--muted); font-size: 11px; margin-bottom: 15px;">— OU COPIER LE CODE ICI —</p>
        <textarea id="json-input" style="width:100%; height: 120px; background: #000; color: var(--correct); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; font-family: 'DM Mono'; font-size: 11px; outline: none;"></textarea>
        
        <div style="display: flex; gap: 10px; margin-top: 25px;">
            <button class="btn btn-primary" style="flex: 2;" onclick="saveImport()">Ajouter au Hub</button>
            <button class="btn btn-secondary" style="flex: 1;" onclick="toggleImport(false)">Annuler</button>
        </div>
    </div>
</div>

<script>
    let library = [];
    let currentQuiz = null;
    let currentIdx = 0;
    let score = 0;

    // --- NAVIGATION ---
    function enterApp() {
        document.getElementById('welcome-screen').style.opacity = '0';
        document.getElementById('welcome-screen').style.pointerEvents = 'none';
        setTimeout(() => {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('main-hub').style.display = 'block';
            init();
        }, 600);
    }

    function init() {
        const saved = localStorage.getItem('quiz_engine_ultimate');
        library = saved ? JSON.parse(saved) : [];
        renderLibrary();
    }

    function renderLibrary() {
        const list = document.getElementById('quiz-list');
        if (library.length === 0) {
            list.innerHTML = `<div class="empty-state"><p>Aucun quiz importé.</p></div>`;
            return;
        }

        list.innerHTML = library.map((quiz, i) => `
            <div class="quiz-card" onclick="startQuiz(${i})">
                <p style="color: var(--accent); font-size: 10px; font-weight: bold; margin-bottom: 8px;">${quiz.questions.length} QUESTIONS</p>
                <h3 style="font-family: Syne; font-size: 24px; line-height: 1.1;">${quiz.titre}</h3>
                <div style="margin-top: 25px; display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 10px; color: var(--muted);">MODULE JSON</span>
                    <button class="btn-secondary" style="padding: 5px 10px; font-size: 9px; border-radius: 6px;" onclick="event.stopPropagation(); deleteQuiz(${i})">Supprimer</button>
                </div>
            </div>
        `).join('');
    }

    // --- LOGIQUE DU QUIZ (CORRECTION BUG) ---
    function startQuiz(index) {
        currentQuiz = library[index];
        currentIdx = 0; score = 0;
        document.getElementById('quiz-player').style.display = 'block';
        renderQuestion();
    }

    function renderQuestion() {
        const q = currentQuiz.questions[currentIdx];
        const container = document.getElementById('player-content');
        document.getElementById('p-fill').style.width = `${(currentIdx / currentQuiz.questions.length) * 100}%`;

        container.innerHTML = `
            <div class="q-card">
                <p style="color: var(--accent); font-size: 11px; margin-bottom: 15px; font-weight: bold;">QUESTION ${currentIdx + 1} / ${currentQuiz.questions.length}</p>
                <h2 style="font-family: Syne; margin-bottom: 30px; font-size: 28px; line-height: 1.2;">${q.question}</h2>
                <div id="options">
                    ${q.choix.map((c, i) => `<button class="choice-btn" onclick="handleChoice(this, ${i})">${c}</button>`).join('')}
                </div>
                <div id="feedback" class="hidden" style="margin-top: 35px; padding: 25px; background: rgba(124,106,255,0.05); border-left: 4px solid var(--accent); border-radius: 0 16px 16px 0;">
                    <p style="font-size: 15px; line-height: 1.6;">${q.explication || "Pas d'explication disponible."}</p>
                    <button class="btn btn-primary" style="margin-top: 20px; width: 100%;" onclick="nextStep()">Suivant →</button>
                </div>
            </div>
        `;
    }

    function handleChoice(btn, selectedIndex) {
        const q = currentQuiz.questions[currentIdx];
        
        // --- NETTOYAGE DES VALEURS (Fix du bug) ---
        const userChoice = q.choix[selectedIndex].toString().trim().toLowerCase();
        const correctAnswer = q.reponse.toString().trim().toLowerCase();
        
        const btns = document.querySelectorAll('.choice-btn');
        btns.forEach(b => b.disabled = true);

        if (userChoice === correctAnswer) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            // On surligne la bonne réponse pour l'utilisateur
            btns.forEach(b => {
                if (b.innerText.trim().toLowerCase() === correctAnswer) {
                    b.classList.add('correct');
                }
            });
        }
        document.getElementById('feedback').classList.remove('hidden');
    }

    function nextStep() {
        currentIdx++;
        if (currentIdx < currentQuiz.questions.length) renderQuestion();
        else showResult();
    }

    function showResult() {
        const pct = Math.round((score / currentQuiz.questions.length) * 100);
        document.getElementById('player-content').innerHTML = `
            <div class="q-card" style="text-align: center;">
                <h1 style="font-size: 90px; font-family: Syne; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">${pct}%</h1>
                <p style="font-size: 20px; margin-bottom: 40px;">Score : ${score} / ${currentQuiz.questions.length}</p>
                <button class="btn btn-primary" onclick="closePlayer()">Retour au Dashboard</button>
            </div>
        `;
    }

    // --- GESTION IMPORT & FICHIERS ---
    function handleFile(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                document.getElementById('json-input').value = event.target.result;
                document.getElementById('file-label').innerHTML = `Fichier détecté : <strong>${file.name}</strong>`;
            };
            reader.readAsText(file);
        }
    }

    function saveImport() {
        try {
            const data = JSON.parse(document.getElementById('json-input').value);
            if (!data.titre || !data.questions) throw new Error("Format invalide");
            library.push(data);
            localStorage.setItem('quiz_engine_ultimate', JSON.stringify(library));
            renderLibrary();
            toggleImport(false);
            document.getElementById('json-input').value = '';
        } catch (e) {
            alert("Erreur : Le format JSON n'est pas correct. Vérifiez la structure.");
        }
    }

    function deleteQuiz(index) {
        if (confirm("Supprimer ce quiz ?")) {
            library.splice(index, 1);
            localStorage.setItem('quiz_engine_ultimate', JSON.stringify(library));
            renderLibrary();
        }
    }

    function toggleImport(show) { document.getElementById('import-zone').style.display = show ? 'flex' : 'none'; }
    function closePlayer() { document.getElementById('quiz-player').style.display = 'none'; }

</script>
</body>
</html>
