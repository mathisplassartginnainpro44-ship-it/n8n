<div class="modal-actions">
        <button class="btn btn-primary" onclick="importQuiz()">Importer</button>
        <button class="btn btn-ghost" onclick="closeImportModal()">Annuler</button>
      </div>
    </div>
  </div>

  <div id="toast">Message</div>

</div> <script>
/* ══ CONFIGURATION & DATA ══ */
let quizzes = JSON.parse(localStorage.getItem('quizzes')) || [];
let stats = JSON.parse(localStorage.getItem('quiz_stats')) || {};
let reviews = JSON.parse(localStorage.getItem('quiz_reviews')) || [];
let currentQuiz = null;
let currentQIdx = 0;
let userScore = 0;
let sessionErrors = [];

/* ══ NAVIGATION ══ */
function enterApp() {
  document.getElementById('welcome').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('welcome').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderQuizzes();
    updateGlobalStats();
    renderReviews();
  }, 700);
}

function openPanel(id) {
  closePanel();
  document.getElementById(id + '-panel').classList.add('open');
}

function closePanel() {
  document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('open'));
}

/* ══ GESTION DES QUIZ (AVEC SUPPRESSION) ══ */
function renderQuizzes() {
  const grid = document.getElementById('quiz-grid');
  if (quizzes.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📂</div>
        <h3>Aucun quiz trouvé</h3>
        <p>Importe un fichier JSON pour commencer tes révisions.</p>
      </div>`;
    return;
  }

  grid.innerHTML = quizzes.map((q, i) => {
    const isDone = stats[q.id] ? true : false;
    return `
      <div class="quiz-card" onclick="startQuiz(${i})">
        <div class="card-meta">Module ${i+1}</div>
        <div class="card-title">${q.titre}</div>
        <div class="card-footer">
          <span class="card-badge ${isDone ? 'badge-done' : 'badge-new'}">
            ${isDone ? 'Complété' : 'Nouveau'}
          </span>
          <button class="btn-danger btn-sm" onclick="event.stopPropagation(); deleteQuiz(${i})">Effacer</button>
        </div>
      </div>
    `;
  }).join('');
}

// FONCTION SUPPRIMER UN QUIZ
function deleteQuiz(index) {
  if(confirm("Supprimer ce quiz définitivement ?")) {
    quizzes.splice(index, 1);
    saveQuizzes();
    renderQuizzes();
    showToast("Quiz supprimé");
  }
}

function saveQuizzes() {
  localStorage.setItem('quizzes', JSON.stringify(quizzes));
}

/* ══ IMPORTATION ══ */
function openImportModal() { document.getElementById('modal-backdrop').style.display = 'flex'; }
function closeImportModal() { document.getElementById('modal-backdrop').style.display = 'none'; }

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    document.getElementById('json-input').value = e.target.result;
    document.getElementById('file-label').innerHTML = `Fichier prêt : <strong>${file.name}</strong>`;
  };
  reader.readAsText(file);
}

function importQuiz() {
  const input = document.getElementById('json-input').value;
  try {
    const data = JSON.parse(input);
    const newQuiz = {
      id: 'q_' + Date.now(),
      titre: data.titre || "Quiz sans titre",
      questions: data.questions || []
    };
    quizzes.push(newQuiz);
    saveQuizzes();
    renderQuizzes();
    closeImportModal();
    showToast("Quiz importé avec succès !");
    document.getElementById('json-input').value = "";
  } catch(e) {
    alert("Erreur dans le format JSON.");
  }
}

/* ══ ENGINE DU JOUEUR ══ */
function startQuiz(idx) {
  currentQuiz = quizzes[idx];
  currentQIdx = 0;
  userScore = 0;
  sessionErrors = [];
  document.getElementById('player').style.display = 'block';
  document.getElementById('player-title').innerText = currentQuiz.titre;
  showQuestion();
}

function showQuestion() {
  const q = currentQuiz.questions[currentQIdx];
  const total = currentQuiz.questions.length;
  
  document.getElementById('ls-num').innerText = userScore;
  document.getElementById('ls-den').innerText = '/' + total;
  document.getElementById('prog-fill').style.width = ((currentQIdx / total) * 100) + '%';

  let html = `
    <div class="q-wrap">
      <div class="q-num">Question ${currentQIdx + 1}/${total}</div>
      <div class="q-text">${q.question}</div>
      <div class="choices">
        ${q.options.map((opt, i) => `
          <button class="choice" onclick="checkAnswer(${i})">
            <span class="choice-letter">${String.fromCharCode(65 + i)}</span>
            ${opt}
          </button>
        `).join('')}
      </div>
      <div id="feedback"></div>
    </div>
  `;
  document.getElementById('player-content').innerHTML = html;
}

function checkAnswer(idx) {
  const q = currentQuiz.questions[currentQIdx];
  const choices = document.querySelectorAll('.choice');
  const isCorrect = idx === q.reponse;
  
  choices.forEach(c => c.disabled = true);
  
  if (isCorrect) {
    userScore++;
    choices[idx].classList.add('correct');
  } else {
    choices[idx].classList.add('wrong');
    choices[q.reponse].classList.add('correct');
    sessionErrors.push({ q: q.question, given: q.options[idx], correct: q.options[q.reponse] });
  }

  const feedback = document.getElementById('feedback');
  feedback.innerHTML = `
    <div class="feedback-box">
      <div class="feedback-icon">${isCorrect ? '✅ Excellent' : '❌ Pas tout à fait'}</div>
      <p class="feedback-text">${q.explication || ""}</p>
      <button class="btn btn-primary next-btn" onclick="nextQuestion()">
        ${currentQIdx + 1 < currentQuiz.questions.length ? 'Question suivante' : 'Voir les résultats'}
      </button>
    </div>
  `;
}

function nextQuestion() {
  currentQIdx++;
  if (currentQIdx < currentQuiz.questions.length) {
    showQuestion();
  } else {
    finishQuiz();
  }
}

function finishQuiz() {
  const finalNote = ((userScore / currentQuiz.questions.length) * 20).toFixed(1);
  stats[currentQuiz.id] = { score: finalNote, errors: sessionErrors };
  localStorage.setItem('quiz_stats', JSON.stringify(stats));
  
  document.getElementById('player-content').innerHTML = `
    <div class="results-wrap">
      <div class="result-label">Quiz terminé</div>
      <div class="result-score-big">${finalNote}</div>
      <div class="result-detail">Tu as validé ${userScore} questions sur ${currentQuiz.questions.length}</div>
      <div class="result-note-20">
        <span class="result-note-lbl">Moyenne</span>
        <span class="note-val">${finalNote}/20</span>
      </div>
      <div class="result-actions">
        <button class="btn btn-primary" onclick="closePlayer()">Retour au Dashboard</button>
      </div>
    </div>
  `;
  updateGlobalStats();
}

function closePlayer() {
  document.getElementById('player').style.display = 'none';
  renderQuizzes();
}

/* ══ STATISTIQUES ══ */
function updateGlobalStats() {
  const values = Object.values(stats).map(s => parseFloat(s.score));
  const avg = values.length ? (values.reduce((a, b) => a + b, 0) / values.length).toFixed(1) : "—";
  
  document.getElementById('gsw-num').innerText = avg;
  document.getElementById('sp-avg-num').innerText = avg;
  document.getElementById('gsw-bar').style.width = values.length ? (avg * 5) + '%' : '0%';
  document.getElementById('sp-avg-bar').style.width = values.length ? (avg * 5) + '%' : '0%';
  document.getElementById('gsw-sub').innerText = values.length + " quiz complétés";

  // Liste des scores
  const list = document.getElementById('sp-list');
  list.innerHTML = Object.keys(stats).map(id => {
    const q = quizzes.find(quiz => quiz.id === id);
    if(!q) return '';
    return `
      <div class="sp-item">
        <div class="sp-item-title">${q.titre}</div>
        <div class="sp-item-row">
          <div class="sp-bar"><div class="sp-bar-fill" style="width:${stats[id].score*5}%; background:var(--accent)"></div></div>
          <div class="sp-note">${stats[id].score}/20</div>
        </div>
      </div>
    `;
  }).join('');
}

function resetStats() {
  if(confirm("Réinitialiser tous les scores ?")) {
    stats = {};
    localStorage.removeItem('quiz_stats');
    updateGlobalStats();
    renderQuizzes();
    showToast("Stats remises à zéro");
  }
}

/* ══ GESTION DES AVIS (SUPPRESSION FIXÉE) ══ */
let selectedStars = 0;
document.querySelectorAll('#stars-row .star').forEach(s => {
  s.onclick = () => {
    selectedStars = s.dataset.v;
    document.querySelectorAll('#stars-row .star').forEach(st => {
      st.classList.toggle('on', st.dataset.v <= selectedStars);
    });
  };
});

function submitReview() {
  const text = document.getElementById('review-text').value;
  if (!selectedStars) return alert("Choisis une note !");
  
  const newReview = {
    stars: selectedStars,
    text: text,
    date: new Date().toLocaleDateString('fr-FR')
  };
  
  reviews.unshift(newReview);
  localStorage.setItem('quiz_reviews', JSON.stringify(reviews));
  
  document.getElementById('review-text').value = "";
  selectedStars = 0;
  document.querySelectorAll('#stars-row .star').forEach(st => st.classList.remove('on'));
  
  renderReviews();
  showToast("Avis enregistré");
}

function renderReviews() {
  const list = document.getElementById('reviews-list');
  const empty = document.getElementById('reviews-empty');
  
  if (reviews.length === 0) {
    list.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  
  empty.style.display = "none";
  list.innerHTML = reviews.map((r, i) => `
    <div class="review-card">
      <div class="review-card-top">
        <div class="review-stars">${"⭐".repeat(r.stars)}</div>
        <div class="review-date">${r.date}</div>
      </div>
      <div class="review-body">${r.text || "Pas de commentaire."}</div>
      <button class="review-delete" onclick="deleteReview(${i})">Supprimer l'avis</button>
    </div>
  `).join('');
}

// LA FONCTION SUPPRIMER QUI FONCTIONNE MAINTENANT :
function deleteReview(index) {
  reviews.splice(index, 1);
  localStorage.setItem('quiz_reviews', JSON.stringify(reviews));
  renderReviews();
  showToast("Avis supprimé");
}

/* ══ THEME & UTILS ══ */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Couleurs par défaut pour le panneau thème
const accents = ['#7c6aff', '#2dff9e', '#ff6a9e', '#ffb347', '#00d1ff'];
document.getElementById('accent-grid').innerHTML = accents.map(c => 
  `<div class="a-swatch" style="background:${c}" onclick="setAccent('${c}')"></div>`
).join('');

function setAccent(c) {
  document.documentElement.style.setProperty('--a1', c);
  showToast("Couleur mise à jour");
}

function syncGithub() {
  showToast("Synchronisation en cours...");
  setTimeout(() => showToast("Déjà à jour !"), 1500);
}
</script>
</body>
</html>
